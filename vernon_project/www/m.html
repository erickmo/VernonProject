    <script>
      (function () {
        try {
          var t = localStorage.getItem('vernon-theme') || 'system'
          var dark = t === 'dark' || (t === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)
          if (dark) document.documentElement.classList.add('dark')
        } catch (e) {}
      })()
    </script>
    <script>
      // TEMP DEBUG (blank-page diagnosis): surface any uncaught module-load or
      // unhandled render error on screen instead of a white page. Remove once fixed.
      (function () {
        var shown = false
        function show(msg) {
          if (shown) return
          shown = true
          var r = document.getElementById('root') || document.body
          r.innerHTML =
            '<pre style="margin:0;padding:16px;white-space:pre-wrap;word-break:break-word;font:12px/1.5 monospace;color:#b91c1c;background:#fff">APP ERROR\n\n' +
            msg +
            '</pre>'
        }
        window.addEventListener('error', function (e) {
          show((e.message || 'error') + '\n' + ((e.error && e.error.stack) || e.filename + ':' + e.lineno))
        })
        window.addEventListener('unhandledrejection', function (e) {
          var r = e.reason
          show('unhandledrejection: ' + ((r && (r.stack || r.message)) || r))
        })
      })()
    </script>
